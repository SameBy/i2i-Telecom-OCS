<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>i2i OCS - Call Authorization Simulation</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        .alert { padding: 15px; margin-top: 20px; border-radius: 4px; font-weight: bold; }
        .alert-SUCCESS { background-color: #d4edda; color: #155724; }
        .alert-FAILED { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="container">
    <h2>i2i Systems - OCS Call Test</h2>
    <form action="/authorize-call" method="post">
        <div class="form-group">
            <label>Subscriber MSISDN:</label>
            <input type="text" name="msisdn" placeholder="e.g. 5551112233" required />
        </div>
        <div class="form-group">
            <label>Destination Number:</label>
            <input type="text" name="destination" placeholder="e.g. 5559998877" required />
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="isInternational" value="true" /> International Call
            </label>
        </div>
        <div class="form-group">
            <label>Requested Duration (Minutes):</label>
            <input type="number" name="duration" min="1" required />
        </div>
        <button type="submit">Initiate Call Control</button>
    </form>
    <div th:if="${status}" th:class="'alert alert-' + ${status}">
        <p th:text="${message}"></p>
    </div>
</div>
</body>
</html>
