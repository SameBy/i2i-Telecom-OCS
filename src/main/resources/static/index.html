<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i2i Telecom OCS - Test Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>body { background-color: #0f172a; color: #f8fafc; }</style>
</head>
<body class="font-sans min-h-screen flex flex-col justify-between">
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3"><span class="text-2xl">📱</span><h1 class="text-xl font-bold tracking-wider text-indigo-400">i2i Telecom OCS Console</h1></div>
        <span class="bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full text-xs font-semibold border border-emerald-500/20 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Multi-VM Kafka Active
        </span>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 flex flex-col gap-6">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                <h2 class="text-lg font-bold mb-4 text-slate-300 flex items-center gap-2">⚡ Execute Call Authorization Request</h2>
                <form id="apiForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Subscriber (MSISDN)</label>
                            <input type="text" id="msisdn" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none" placeholder="e.g. 5551110001">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Destination Number</label>
                            <input type="text" id="destination" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none" placeholder="e.g. 5559876543">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Duration (Minutes)</label>
                            <input type="number" id="duration" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none" placeholder="e.g. 5">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Call Type</label>
                            <select id="isInternational" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none">
                                <option value="false">Domestic Call (Yurt İçi)</option>
                                <option value="true">International Call (Yurt Dışı)</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3 pt-2">
                        <button type="button" onclick="sendAuthorization()" class="flex-1 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition">
                            Send Auth Request to Gateway (VM-1)
                        </button>
                        <button type="button" onclick="resetDatabase()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 px-6 rounded-xl border border-slate-700 transition">
                            🔄 Reset All Balances
                        </button>
                    </div>
                </form>
            </div>

            <div class="bg-slate-950 border border-slate-900 rounded-2xl p-6 flex-1 flex flex-col shadow-inner">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Gateway Server Responses (JSON)</span>
                    <span id="statusCode" class="text-xs font-mono font-bold text-slate-400">IDLE</span>
                </div>
                <pre id="jsonOutput" class="font-mono text-sm text-emerald-400 bg-slate-900/50 p-4 rounded-xl overflow-x-auto border border-slate-900 flex-1 min-h-[150px]">Waiting for triggers...</pre>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl flex flex-col h-[calc(100vh-140px)] overflow-y-auto">
            <h2 class="text-lg font-bold mb-4 text-slate-300 flex items-center gap-2">🎯 Test Scenarios (Click to Load)</h2>
            <div class="space-y-3 pr-1" id="scenariosContainer"></div>
        </div>
    </main>

    <footer class="border-t border-slate-800/60 bg-slate-950/40 text-center py-3 text-xs text-slate-500">i2i Systems Telecom OCS Simulation Module</footer>

    <script>
        const scenarios = [
            { id: 1, title: "Standard Domestic Call", msisdn: "5551110001", dest: "5559876543", dur: 5, inter: "false", badge: "SUCCESS", color: "bg-emerald-500/10 text-emerald-400 border-emerald-500/20", desc: "Kayıtlı abone, bol bakiye (50dk). Sorunsuz geçiş sağlar." },
            { id: 2, title: "Critical Balance Warning", msisdn: "5551110002", dest: "5556667788", dur: 10, inter: "false", badge: "SMS ALERT", color: "bg-amber-500/10 text-amber-400 border-amber-500/20", desc: "12 dk bakiyesi var, 10 dk konuşunca kalan 2 dk (<%20) için uyarı tetikler." },
            { id: 3, title: "Zero Balance Rejection", msisdn: "5551110003", dest: "5552223344", dur: 5, inter: "false", badge: "BLOCKED", color: "bg-rose-500/10 text-rose-400 border-rose-500/20", desc: "Bakiyesi 0 olan abone. VM-1 aramayı başlatmaz, reddeder." },
            { id: 4, title: "International Call Allowed", msisdn: "5551110004", dest: "4471234567", dur: 5, inter: "true", badge: "SUCCESS", color: "bg-emerald-500/10 text-emerald-400 border-emerald-500/20", desc: "Yurt dışı izni açık ve bakiyesi olan numara. Başarıyla onaylanır." },
            { id: 5, title: "International Call Barred", msisdn: "5551110005", dest: "12125550199", dur: 5, inter: "true", badge: "BARRED", color: "bg-rose-500/10 text-rose-400 border-rose-500/20", desc: "Yurt dışı yetkisi kapalı numara. VM-1 engeller, VM-2 kısıtlama SMS'i atar." },
            { id: 6, title: "Double Crisis UX Rule", msisdn: "5551110006", dest: "12125550199", dur: 5, inter: "true", badge: "CRISIS BOTH", color: "bg-purple-500/10 text-purple-400 border-purple-500/20", desc: "Hem bakiyesi 0 hem de yurt dışı yasak! İki hatayı tek mesajda kurumsal birleştirir." },
            { id: 7, title: "Partial Allowance Demo", msisdn: "5551110007", dest: "5559876543", dur: 10, inter: "false", badge: "PARTIAL", color: "bg-blue-500/10 text-blue-400 border-blue-500/20", desc: "3 dk bakiyesi var ama 10 dk istiyor. Sistem 3 dk konuşturup kapatacak." },
            { id: 8, title: "Package Depletion Test", msisdn: "5551110008", dest: "5554445566", dur: 15, inter: "false", badge: "DEPLETED", color: "bg-orange-500/10 text-orange-400 border-orange-500/20", desc: "15 dk bakiyeyi tam ucu ucuna bitirme senaryosu. Paket bitti mesajı tetikler." },
            { id: 9, title: "Subscriber Not Found", msisdn: "5559999999", dest: "5551112233", dur: 5, inter: "false", badge: "NOT FOUND", color: "bg-slate-500/10 text-slate-400 border-slate-500/20", desc: "Sistemde kaydı olmayan numara denemesi. Doğrudan reddedilir." },
            { id: 10, title: "High-Duration Rejection", msisdn: "5551110010", dest: "5557778899", dur: 500, inter: "false", badge: "OVER LIMIT", color: "bg-rose-500/10 text-rose-400 border-rose-500/20", desc: "100 dk bakiyesi olan birinin tek seferde 500 dk istemesi. Koruma modu engeli." }
        ];

        const container = document.getElementById("scenariosContainer");
        scenarios.forEach(sc => {
            const card = document.createElement("div");
            card.className = "p-4 bg-slate-950/60 border border-slate-800/80 rounded-xl hover:border-indigo-500/50 cursor-pointer transition flex flex-col gap-2";
            card.onclick = () => {
                document.getElementById("msisdn").value = sc.msisdn;
                document.getElementById("destination").value = sc.dest;
                document.getElementById("duration").value = sc.dur;
                document.getElementById("isInternational").value = sc.inter;
                document.getElementById("jsonOutput").innerText = `Scenario [${sc.title}] loaded into fields.`;
            };
            card.innerHTML = `<div class="flex justify-between items-start gap-2"><span class="text-sm font-bold text-slate-200">${sc.id}. ${sc.title}</span><span class="text-[10px] font-mono px-2 py-0.5 rounded border ${sc.color}">${sc.badge}</span></div><p class="text-xs text-slate-400 leading-relaxed">${sc.desc}</p>`;
            container.appendChild(card);
        });

        async function resetDatabase() {
            try {
                const response = await fetch('/reset-db', { method: "POST" });
                const data = await response.json();
                alert(data.message);
                location.reload();
            } catch (err) { alert("Reset failed: " + err.message); }
        }

        async function sendAuthorization() {
            const msisdn = document.getElementById("msisdn").value;
            const destination = document.getElementById("destination").value;
            const duration = document.getElementById("duration").value;
            const isInternational = document.getElementById("isInternational").value;
            const jsonOutput = document.getElementById("jsonOutput");
            const statusBadge = document.getElementById("statusCode");
            
            jsonOutput.innerText = "Streaming event to Kafka...";
            const formData = new URLSearchParams();
            formData.append("msisdn", msisdn);
            formData.append("destination", destination);
            formData.append("duration", duration);
            if (isInternational === "true") formData.append("isInternational", "true");

            try {
                const response = await fetch('/authorize-call', { method: "POST", headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData });
                const data = await response.json();
                jsonOutput.innerText = JSON.stringify(data, null, 4);
                statusBadge.innerText = data.status;
            } catch (error) { jsonOutput.innerText = "Error: " + error.message; }
        }
    </script>
</body>
</html>
